<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout - Lan Anh Beauty</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&amp;family=Noto+Serif:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#775932",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#fceee5",
                        "tertiary-fixed": "#f1dfd1",
                        "surface-bright": "#fff8f5",
                        "on-secondary-container": "#67645f",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#d4c4b6",
                        "surface": "#fff8f5",
                        "secondary-fixed-dim": "#cac6bf",
                        "on-secondary-fixed-variant": "#494742",
                        "on-primary-fixed-variant": "#5d421d",
                        "on-primary-fixed": "#2a1800",
                        "primary-container": "#c5a073",

                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",

                    },
                    "spacing": {
                        "gutter": "32px",
                        "component-gap": "24px",
                        "container-max": "1280px",
                        "unit": "8px",
                        "section-padding": "120px"
                    },
                    "fontFamily": {
                        "label-caps": ["Manrope"],
                        "headline-xl": ["Noto Serif"],

                        "body-md": ["Manrope"]

                    "fontSize": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body-md antialiased min-h-screen flex flex-col">
<!-- TopAppBar suppressed due to transactional intent (Checkout) -->
<main class="flex-grow w-full max-w-[1280px] mx-auto px-gutter py-section-padding">
<header class="mb-16 text-center">
<h1 class="font-headline-xl text-headline-xl text-primary mb-4">Checkout</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Complete your purchase securely.</p>
</header>
<div class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-24">
<!-- Left Column: Form -->
<div class="lg:col-span-7 space-y-16">
<!-- Customer Information -->
<section>
<h2 class="font-headline-md text-headline-md text-on-surface mb-8 border-b border-outline-variant pb-4">Customer Information</h2>
<div class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="firstName">FIRST NAME</label>
<input class="w-full bg-transparent border-b border-outline-variant py-3 focus:outline-none focus:border-primary-container transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline" id="firstName" placeholder="Enter first name" type="text"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="lastName">LAST NAME</label>
<input class="w-full bg-transparent border-b border-outline-variant py-3 focus:outline-none focus:border-primary-container transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline" id="lastName" placeholder="Enter last name" type="text"/>
</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="email">EMAIL ADDRESS</label>
<input class="w-full bg-transparent border-b border-outline-variant py-3 focus:outline-none focus:border-primary-container transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline" id="email" placeholder="Enter email address" type="email"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="phone">PHONE NUMBER</label>
<input class="w-full bg-transparent border-b border-outline-variant py-3 focus:outline-none focus:border-primary-container transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline" id="phone" placeholder="Enter phone number" type="tel"/>
</div>
</div>
</section>
<!-- Shipping Address -->
<section>
<h2 class="font-headline-md text-headline-md text-on-surface mb-8 border-b border-outline-variant pb-4">Shipping Address</h2>
<div class="space-y-6">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="address">STREET ADDRESS</label>
<input class="w-full bg-transparent border-b border-outline-variant py-3 focus:outline-none focus:border-primary-container transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline" id="address" placeholder="Enter street address" type="text"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="apartment">APARTMENT, SUITE, ETC. (OPTIONAL)</label>
<input class="w-full bg-transparent border-b border-outline-variant py-3 focus:outline-none focus:border-primary-container transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline" id="apartment" placeholder="Apartment, suite, unit, etc." type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="city">CITY</label>
<input class="w-full bg-transparent border-b border-outline-variant py-3 focus:outline-none focus:border-primary-container transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline" id="city" placeholder="Enter city" type="text"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="postalCode">POSTAL CODE</label>
<input class="w-full bg-transparent border-b border-outline-variant py-3 focus:outline-none focus:border-primary-container transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline" id="postalCode" placeholder="Enter postal code" type="text"/>
</div>
</div>
</div>
</section>
<!-- Payment Method -->
<section>
<h2 class="font-headline-md text-headline-md text-on-surface mb-8 border-b border-outline-variant pb-4">Payment Method</h2>
<div class="space-y-4">
<label class="flex items-center p-4 border border-outline-variant rounded-DEFAULT cursor-pointer hover:border-primary-container transition-colors">
<input checked="" class="text-primary-container focus:ring-primary-container border-outline w-5 h-5" name="payment" type="radio" value="cod"/>
<span class="ml-4 font-body-md text-body-md text-on-surface">Cash on Delivery (COD)</span>
</label>
<label class="flex items-center p-4 border border-outline-variant rounded-DEFAULT cursor-pointer hover:border-primary-container transition-colors">
<input class="text-primary-container focus:ring-primary-container border-outline w-5 h-5" name="payment" type="radio" value="bank"/>
<span class="ml-4 font-body-md text-body-md text-on-surface">Bank Transfer</span>
</label>
<label class="flex items-center p-4 border border-outline-variant rounded-DEFAULT cursor-pointer hover:border-primary-container transition-colors">
<input class="text-primary-container focus:ring-primary-container border-outline w-5 h-5" name="payment" type="radio" value="ewallet"/>
<span class="ml-4 font-body-md text-body-md text-on-surface">E-wallet</span>
</label>
</div>
</section>
</div>
<!-- Right Column: Order Summary -->
<div class="lg:col-span-5">
<div class="bg-surface-container p-8 rounded-lg sticky top-8 shadow-[0_4px_30px_rgba(197,160,115,0.05)]">
<h2 class="font-headline-md text-headline-md text-on-surface mb-8">Order Summary</h2>
<div class="space-y-6 mb-8">
<!-- Product Item -->
<div class="flex items-center gap-6">
<div class="w-20 h-24 flex-shrink-0 bg-surface-container-highest rounded-DEFAULT overflow-hidden">
<img alt="Product Image" class="w-full h-full object-cover" data-alt="A macro shot of a luxurious face cream texture in a minimalist white jar, resting on a soft beige surface. The lighting is soft and diffused, highlighting the smooth, creamy consistency. A few drops of golden oil are visible nearby. The overall mood is serene and expert, adhering to a light-mode aesthetic with organic beige and gold tones." src="https://lh3.googleusercontent.com/aida/ADBb0ui4jkig0ssxyA5qQh0KqRJH_XnHrncCcdkVZHrG_H99I0EDIFSniBMtstAA6ZvVaeCxeX8IefwzwXoHuyEkahf4IQYziqcLNNdKAKOKEAsACTfo9t_JFpD_3v5qUU3WCZUiQH1DrRqeWB4EuT1cGCdBh5YjZJ3o_5mimF8_aJl74dlF1-zVpJwalxVa2RWbzWI1JEX8xLn2vF2_80YKiDrUpNOJ8uMN_27T-ov5ex9ofTYJKKgOvedZoHpr2M9Njj7fUrd7rps8"/>
</div>
<div class="flex-grow">
<h3 class="font-body-lg text-body-lg text-on-surface">Rejuvenating Gold Serum</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Qty: 1</p>
</div>
<div class="font-body-lg text-body-lg text-on-surface text-right">
                                $125.00
                            </div>
</div>
</div>
<div class="border-t border-outline-variant pt-6 space-y-4">
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
<span>Subtotal</span>
<span>$125.00</span>
</div>
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
<span>Shipping</span>
<span>Calculated at next step</span>
</div>
<div class="flex justify-between font-headline-md text-headline-md text-on-surface pt-4 border-t border-outline-variant">
<span>Total</span>
<span>$125.00</span>
</div>
</div>
<button class="w-full mt-8 bg-primary-container text-on-primary py-4 px-6 rounded-DEFAULT font-label-caps text-label-caps hover:brightness-105 transition-all shadow-[0_4px_20px_rgba(197,160,115,0.1)]">
                        PLACE ORDER
                    </button>
<div class="mt-6 flex items-center justify-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="font-label-caps text-[10px] tracking-wider uppercase">Secure Checkout</span>
</div>
</div>
</div>
</div>
</main>
<!-- Footer suppressed due to transactional intent (Checkout) -->
</body></html>
