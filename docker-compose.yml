version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: spa_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: spa_lananh
      MYSQL_USER: spa_user
      MYSQL_PASSWORD: spapassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spa_backend
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - DB_HOST=mysql
      - DB_NAME=spa_lananh
      - DB_USER=spa_user
      - DB_PASS=spapassword
      - PORT=5000
    depends_on:
      - mysql

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: spa_client
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: spa_admin
    restart: always
    ports:
      - "5174:5174"
    volumes:
      - ./admin:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  mysql_data: